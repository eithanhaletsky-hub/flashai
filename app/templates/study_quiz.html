{% extends "base.html" %}
{% block title %}Quiz - {{ deck.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Multiple Choice</h1>
        <a href="{{ url_for('study.study_menu', deck_id=deck.id) }}" class="text-gray-500 hover:text-gray-700 transition">Back to Modes</a>
    </div>

    <div id="quiz-area">
        <div class="text-center text-gray-500 mb-4">
            <span id="progress-text">Question 1 of {{ quiz_data|length }}</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
            <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width: 0%"></div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8 mb-6">
            <span class="text-xs font-medium text-gray-400 uppercase tracking-wide">Question</span>
            <p id="question-text" class="text-2xl text-gray-800 mt-2 leading-relaxed"></p>
        </div>

        <div id="options-container" class="space-y-3"></div>

        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-medium">
            Next Question
        </button>
    </div>

    <div id="quiz-complete" class="hidden text-center py-16">
        <div class="text-6xl mb-4">&#x1F3C6;</div>
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Quiz Complete!</h2>
        <p class="text-xl text-gray-600 mb-1">Score: <span id="final-score" class="font-bold text-indigo-600"></span></p>
        <p class="text-gray-500 mb-8" id="score-message"></p>
        <div class="flex gap-4 justify-center">
            <a href="{{ url_for('study.study_quiz', deck_id=deck.id) }}" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">Try Again</a>
            <a href="{{ url_for('study.study_menu', deck_id=deck.id) }}" class="bg-gray-100 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-200 transition">Other Modes</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const quizData = {{ quiz_data|tojson }};
let current = 0;
let score = 0;
let answered = false;

function showQuestion() {
    if (current >= quizData.length) {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('quiz-complete').classList.remove('hidden');
        const pct = Math.round((score / quizData.length) * 100);
        document.getElementById('final-score').textContent = `${score}/${quizData.length} (${pct}%)`;
        const msg = pct === 100 ? 'Perfect! Amazing!' : pct >= 80 ? 'Great job!' : pct >= 60 ? 'Good effort! Keep practicing.' : 'Keep studying, you\'ll get there!';
        document.getElementById('score-message').textContent = msg;
        return;
    }
    answered = false;
    const q = quizData[current];
    document.getElementById('question-text').textContent = q.question;
    document.getElementById('progress-text').textContent = `Question ${current + 1} of ${quizData.length}`;
    document.getElementById('progress-bar').style.width = `${((current + 1) / quizData.length) * 100}%`;
    document.getElementById('next-btn').classList.add('hidden');

    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'w-full text-right p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-indigo-400 transition text-lg';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(btn, opt, q.correct);
        container.appendChild(btn);
    });
}

function selectAnswer(btn, selected, correct) {
    if (answered) return;
    answered = true;

    const buttons = document.querySelectorAll('#options-container button');
    buttons.forEach(b => {
        b.classList.remove('hover:border-indigo-400');
        if (b.textContent === correct) {
            b.classList.remove('border-gray-200');
            b.classList.add('border-green-500', 'bg-green-50');
        }
    });

    if (selected === correct) {
        score++;
        btn.classList.add('border-green-500', 'bg-green-50');
    } else {
        btn.classList.remove('border-gray-200');
        btn.classList.add('border-red-500', 'bg-red-50');
    }

    document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
    current++;
    showQuestion();
}

showQuestion();
</script>
{% endblock %}
