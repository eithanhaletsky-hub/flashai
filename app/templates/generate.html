{% extends "base.html" %}
{% block title %}{{ t.gen_title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">{{ t.gen_title }}</h1>
    <p class="text-gray-500 mb-8">{{ t.gen_desc }}</p>

    <form method="POST" class="space-y-6" id="generate-form">
        <div>
            <label for="topic" class="block text-sm font-medium text-gray-700 mb-2">{{ t.gen_topic }}</label>
            <input type="text" id="topic" name="topic" required
                   placeholder="{{ t.gen_topic_placeholder }}"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-lg">
        </div>

        <div>
            <label for="deck_name" class="block text-sm font-medium text-gray-700 mb-2">{{ t.gen_deck_name }}</label>
            <input type="text" id="deck_name" name="deck_name"
                   placeholder="{{ t.gen_deck_placeholder }}"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="num_cards" class="block text-sm font-medium text-gray-700 mb-2">{{ t.gen_num_cards }}</label>
                <select id="num_cards" name="num_cards"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                    <option value="5">5 {{ t.gen_cards_suffix }}</option>
                    <option value="10" selected>10 {{ t.gen_cards_suffix }}</option>
                    <option value="15">15 {{ t.gen_cards_suffix }}</option>
                    <option value="20">20 {{ t.gen_cards_suffix }}</option>
                    <option value="25">25 {{ t.gen_cards_suffix }}</option>
                    <option value="30">30 {{ t.gen_cards_suffix }}</option>
                </select>
            </div>
            <div>
                <label for="language" class="block text-sm font-medium text-gray-700 mb-2">{{ t.gen_language }}</label>
                <select id="language" name="language"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                    <option value="he">{{ t.gen_hebrew }}</option>
                    <option value="en">{{ t.gen_english }}</option>
                </select>
            </div>
        </div>

        <button type="submit" id="generate-btn"
                class="w-full bg-indigo-600 text-white py-4 rounded-lg hover:bg-indigo-700 transition text-lg font-medium">
            {{ t.gen_submit }}
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const loadingText = {{ t.gen_loading|tojson }};
    document.getElementById('generate-form').addEventListener('submit', function() {
        const btn = document.getElementById('generate-btn');
        btn.textContent = loadingText;
        btn.disabled = true;
        btn.classList.add('opacity-60', 'cursor-not-allowed');
    });
</script>
{% endblock %}
