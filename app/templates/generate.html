{% extends "base.html" %}
{% block title %}Generate Flashcards{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Generate Flashcards</h1>
    <p class="text-gray-500 mb-8">Enter any topic and AI will create flashcards for you</p>

    <form method="POST" class="space-y-6" id="generate-form">
        <div>
            <label for="topic" class="block text-sm font-medium text-gray-700 mb-2">Topic</label>
            <input type="text" id="topic" name="topic" required
                   placeholder="e.g. World War II, Photosynthesis, Python basics..."
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none text-lg">
        </div>

        <div>
            <label for="deck_name" class="block text-sm font-medium text-gray-700 mb-2">Deck Name (optional)</label>
            <input type="text" id="deck_name" name="deck_name"
                   placeholder="Leave empty to use the topic as name"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="num_cards" class="block text-sm font-medium text-gray-700 mb-2">Number of Cards</label>
                <select id="num_cards" name="num_cards"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                    <option value="5">5 cards</option>
                    <option value="10" selected>10 cards</option>
                    <option value="15">15 cards</option>
                    <option value="20">20 cards</option>
                    <option value="25">25 cards</option>
                    <option value="30">30 cards</option>
                </select>
            </div>
            <div>
                <label for="language" class="block text-sm font-medium text-gray-700 mb-2">Language</label>
                <select id="language" name="language"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                    <option value="he">Hebrew</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>

        <button type="submit" id="generate-btn"
                class="w-full bg-indigo-600 text-white py-4 rounded-lg hover:bg-indigo-700 transition text-lg font-medium">
            Generate with AI
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('generate-form').addEventListener('submit', function() {
        const btn = document.getElementById('generate-btn');
        btn.textContent = 'Generating... please wait';
        btn.disabled = true;
        btn.classList.add('opacity-60', 'cursor-not-allowed');
    });
</script>
{% endblock %}
