{% extends "base.html" %}
{% block title %}{{ t.auth_signup_btn }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">{{ t.auth_create_account }}</h1>
        <p class="text-gray-500 text-center mb-6">{{ t.auth_start_learning }}</p>

        <form method="POST" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">{{ t.auth_username }}</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">{{ t.auth_email }}</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">{{ t.auth_password }}</label>
                <input type="password" id="password" name="password" required minlength="6"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label for="confirm" class="block text-sm font-medium text-gray-700 mb-1">{{ t.auth_confirm }}</label>
                <input type="password" id="confirm" name="confirm" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-medium text-lg">
                {{ t.auth_signup_btn }}
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-6">
            {{ t.auth_have_account }}
            <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:underline">{{ t.auth_login_link }}</a>
        </p>
    </div>
</div>
{% endblock %}
